name: Rust (ESP32-S3)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: esp-rs/xtensa-toolchain@v1.5
        with:
          default: true
          build_std: true
          ldproxy: false

      - name: Build
        run: cargo build --verbose --target xtensa-esp32s3-none-elf
